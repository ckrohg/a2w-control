# Production config template for the Pi. Copy to /home/pi/heatpump-bridge/config.yaml
# and fill in the W610 addresses. LEAVE write_enabled FALSE until Phase 2 —
# Phase 1 is read-only by rule (handoff §8).

pumps:
  - id: pump1
    name: Heat Pump 1
    host: 192.168.1.61     # W610 #1 — set a DHCP reservation for its MAC
    port: 8899             # W610 factory default TCP server port
    device_id: 1           # slave address per SW2 DIP (confirm with Winnie's reply)
    poll_interval_s: 20    # 2400 baud: a full poll is ~1.2s of bus time
    write_enabled: false   # Phase 2 flips this — one pump at a time
  - id: pump2
    name: Heat Pump 2
    host: 192.168.1.62     # W610 #2
    port: 8899
    device_id: 1           # separate bus, so same address is fine
    poll_interval_s: 20
    write_enabled: false

guardrails:
  setpoint_min_c: 30
  setpoint_max_c: 55       # = reg 2027 factory default; read reg 2027 during Phase 1 to confirm
  min_write_interval_s: 60
  offline_after_failed_polls: 3

db_path: /home/pi/heatpump-bridge/bridge.db
ui_dir: /home/pi/heatpump-bridge/ui
modbus_timeout_s: 5
