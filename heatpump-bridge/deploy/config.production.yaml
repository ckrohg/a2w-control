# Production config template for the Pi. The bootstrap copies this to
# ~/bridge-data/config.yaml (OUTSIDE the repo — auto-updates never touch it).
# Fill in the W610 addresses there. LEAVE write_enabled FALSE until Phase 2 —
# Phase 1 is read-only by rule (handoff §8).

pumps:
  - id: pump1
    name: Heat Pump 1
    host: 192.168.1.61     # W610 #1 — set a DHCP reservation for its MAC
    # mac: "d8:b0:4c:00:00:00"  # from W610 #1's label — enables identity verification:
    #                           # if this IP ever answers with a different MAC (DHCP
    #                           # reshuffle / swapped units), alert + block writes
    port: 8899             # W610 factory default TCP server port
    device_id: 1           # slave address — default 1 CONFIRMED by Winnie (no DIP change needed)
    poll_interval_s: 20    # 2400 baud: a full poll is ~1.2s of bus time
    write_enabled: false   # Phase 2 flips this — one pump at a time
  - id: pump2
    name: Heat Pump 2
    host: 192.168.1.62     # W610 #2
    # mac: "d8:b0:4c:00:00:00"  # from W610 #2's label
    port: 8899
    device_id: 1           # separate bus, so same address is fine
    poll_interval_s: 20
    write_enabled: false

guardrails:
  setpoint_min_c: 30
  setpoint_max_c: 75       # 167°F, the manual's rated point (hardware max 85°C).
                           # NOTE: unit param 17 (reg 2027) ships at 55 and firmware-caps
                           # the setpoint — raise it on the wall controller to go higher.
                           # Effective max is always min(this, live reg 2027).
  min_write_interval_s: 60
  offline_after_failed_polls: 3
  # Cold-latch safety (fusion audit): unattended writers (scheduler + machine tokens)
  # can't leave a pump in a state the manual/HBX fallback can't undo.
  restrict_unattended_writes: true
  setback_setpoint_c: 40     # scheduler "off" timers lower to this instead of powering off
  #   ^ Phase 2: raise to 46 when the floor below is activated — an unattended write is
  #     clamped by unattended_min_setpoint_c (45), so 40 would just be silently clamped to 45.
  # comfort_setpoint_c: 50   # optional: scheduler "on" timers restore to this
  # --- WINTER-SAFE FLOOR + LEASE (Phase 2 — uncomment when enabling writes) ---
  # Values VALIDATED 2026-07-07 from the house's TempIQ-learned thermal data + an adversarial
  # safety-check — full reasoning + commissioning checks in
  # knowledge/reference/winter-safe-floor-analysis.md. Confidence LOW until the Phase-1
  # cold-snap checks confirm them. Design day: South Hamilton MA, 99.6% = 5°F.
  # unattended_min_setpoint_c: 45  # hard freeze FLOOR for scheduler + token/optimizer writes
  #   (fin-tube baseboard collapses below ~42-43°C; 45 keeps margin). Human UI can still go
  #   to setpoint_min_c. ⚠️ This clamps the SETPOINT, not the ACHIEVED water temp — between
  #   ~-15°C and -20°C ambient a de-rated compressor may not REACH 45°C and the unit's own
  #   backup heater only enables ≤ -20°C (reg 2030). Confirm the HBX 16.5 kW buffer element
  #   holds the buffer at low ambient before trusting this for freeze safety.
  # Remote-optimizer lease: a remote setpoint is a renewable LEASE; on optimizer silence the
  # Pi reverts to this warm baseline so the house is never stranded at a stale value.
  # baseline_setpoint_c: 48       # warm winter default reverted to when a lease lapses
  # lease_max_minutes: 180
  # lease_warn_minutes: 15

# Push alerts (ntfy — free, no account) + external dead-man heartbeat.
# EASIEST: pass A2W_NTFY_TOPIC and/or A2W_HEARTBEAT_URL to pi-bootstrap.sh and it writes this
# block for you (same as the hub/analytics tokens). To wire it MANUALLY, uncomment below:
notifications:
  # 1. Pick a hard-to-guess topic and subscribe to it in the ntfy app (or ntfy.sh/<topic>).
  # ntfy_topic: "a2w-REPLACE-with-something-random"
  # ntfy_server: "https://ntfy.sh"
  # 2. External dead-man. NOT NEEDED if you use the Railway hub — the hub already watches the
  #    Pi's WebSocket check-ins and pushes an ntfy alert if the Pi goes silent (set NTFY_TOPIC
  #    on the hub to the same topic above). heartbeat_url below is an optional extra channel
  #    (e.g. healthchecks.io) only if you want a second, hub-independent monitor.
  # heartbeat_url: "https://hc-ping.com/your-uuid"

# Read-only cloud analytics mirror (optional). The Pi pushes a state snapshot to a Vercel
# app (analytics-mirror/) every interval_s; that hosts the history dashboard. NOT control —
# purely outbound; if it's down, nothing here is affected. See analytics-mirror/README.md.
#
# LIVE MIRROR (deployed 2026-07-07): https://a2w-analytics-mirror.vercel.app (Neon Postgres attached)
# EASIEST: pass A2W_ANALYTICS_TOKEN=<INGEST_TOKEN> (+ optional A2W_ANALYTICS_URL) to
# pi-bootstrap.sh and it writes this block for you, keeping the token out of the repo. To wire
# it MANUALLY, uncomment below and paste the INGEST_TOKEN set on the Vercel project:
analytics:
  # endpoint_url: "https://a2w-analytics-mirror.vercel.app/api/ingest"
  # token: "PASTE_INGEST_TOKEN_FROM_VERCEL"   # must match INGEST_TOKEN on the Vercel project
  # interval_s: 60

# Railway hub — remote control WITHOUT opening a port on the Pi (optional). The bridge dials
# OUT over a WebSocket to a persistent Railway hub (hub/); the cloud optimizer + the Vercel
# dashboard drive setpoints via the hub's HTTP API, which relays them down this same WS. The
# hub client is enabled ONLY when both url and token are set. Setpoint-only by design — power/
# mode/parameter changes stay human-only on the LAN/Funnel path. Every relayed command still
# passes the existing guardrails + lease (silence reverts to baseline_setpoint_c above), so
# it's safe to leave write_enabled false until Phase 2. See deploy/railway-hub.md.
#
# LIVE HUB (deployed 2026-07-06): https://a2w-hub-production.up.railway.app
# EASIEST: don't hand-edit this — pass A2W_HUB_TOKEN=<HUB_PI_TOKEN> (and optionally
# A2W_HUB_URL) to pi-bootstrap.sh and it writes this block for you, keeping the token out of
# the repo. To wire it MANUALLY instead, uncomment below and paste the HUB_PI_TOKEN found on
# Railway (project a2w-hub → service a2w-hub → Variables → HUB_PI_TOKEN):
# hub:
#   url: "wss://a2w-hub-production.up.railway.app/pi"   # the live hub (wss://, /pi path)
#   token: "PASTE_HUB_PI_TOKEN_FROM_RAILWAY"            # NOT the client token; the PI token
#   state_interval_s: 15                       # how often the Pi pushes a state frame

db_path: /home/pi/bridge-data/bridge.db
ui_dir: /home/pi/a2w-control/heatpump-bridge/ui
modbus_timeout_s: 5

# API authentication for machine consumers (e.g. TempIQ) and remote control.
# protect: off (default — LAN/tunnel is the only gate) | writes | all
#   writes = control endpoints need a can_write token or the browser UI session
#   all    = every /api call needs a token or the UI session
# Generate a token with: openssl rand -hex 24
# The browser UI keeps working with no login of its own (session cookie); tokens are
# only for headless callers. See deploy/api-integration.md.
auth:
  protect: "off"          # quote it — unquoted `off` is YAML boolean false
  # ui_password: set this before exposing the dashboard for remote CONTROL — under
  # protect=writes/all the browser must log in once with it (30-day session). Without
  # it, a browser can still read but not control. Machines use tokens and ignore this.
  # ui_password: "a-long-passphrase"
  tokens: []
  #  - token: "REPLACE_WITH_openssl_rand_hex_24"
  #    source: tempiq        # this label is what appears in the audit log for its writes
  #    can_write: true       # false = read-only (observe/recommend); true = full control
