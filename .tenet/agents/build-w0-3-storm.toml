## State machine (pure â€” the eval imports and drives it)

`export function evaluateStormState(prev: StormState, inputs: StormInputs, now: Date): { state: StormState; transitions: string[] }`

Rules, in priority order:
1. `manual.disarm` â†’ `idle` with `suppressedUntil` = now + 12 h; transition "manual-disarm".
2. `manual.armHours` â†’ `armed`, trigger "manual", window now â€¦ now + armHours h.
3. `outageActive === true` â†’ `active` (trigger = prev trigger or "outage"), windowEnd =
